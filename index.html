<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="format-detection" content="telephone=no">
  <meta name="theme-color" content="#2196f3">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <title>Flashcard App</title>

  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap"
  />

  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <style>
    @supports (padding-top: env(safe-area-inset-top)) {
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
    }
    
    body {
      overscroll-behavior-y: contain;
    }
    
    * {
      -webkit-tap-highlight-color: transparent;
    }

    /* Disabling selection app-wide also blocks copying vocabulary words,
       definitions and diary text — exactly what users want to grab in a
       study app. So only the interactive chrome (buttons, nav, the app bar)
       opts out of selection; reading content stays selectable by default. */
    button,
    [role="button"],
    .MuiButtonBase-root,
    .MuiAppBar-root,
    nav {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
